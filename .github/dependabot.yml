version: 2
updates:
  # Keep the GitHub Actions used by the workflows up to date.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"

  # Python package dependencies, declared in python/pyproject.toml.
  - package-ecosystem: "pip"
    directory: "/python"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"

  # The R package's dependencies are not tracked here: Dependabot does not follow
  # CRAN. They are watched at runtime by the continuous-integration checks.
