name: docs

on:
  push:
    branches: [main]
    paths:
      - 'r/theoryforge/**'
      - 'python/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: r/theoryforge
          extra-packages: any::pkgdown, local::.

      - name: Build pkgdown site
        run: Rscript -e 'pkgdown::build_site("r/theoryforge", new_process = FALSE, install = FALSE)'

      - name: Stage pkgdown under site/r
        run: |
          mkdir -p site
          cp -r r/theoryforge/docs site/r

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build mkdocs site
        run: |
          python -m pip install --quiet -e ./python "mkdocs-material" "mkdocstrings[python]"
          cd python && mkdocs build --strict -d ../site/python

      - name: Write landing page
        run: |
          cp r/theoryforge/man/figures/logo.svg site/logo.svg
          cat > site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>theoryforge documentation</title>
            <style>
              body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
                     max-width: 46rem; margin: 4rem auto; padding: 0 1.25rem; line-height: 1.6; color: #1b1b1b; }
              h1 { font-size: 1.8rem; margin-bottom: 0.25rem; }
              p.lead { color: #444; margin-top: 0; }
              .cards { display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 2rem; }
              a.card { flex: 1 1 16rem; border: 1px solid #ddd; border-radius: 10px; padding: 1.1rem 1.25rem;
                       text-decoration: none; color: inherit; }
              a.card:hover { border-color: #888; }
              a.card h2 { margin: 0 0 0.3rem; font-size: 1.15rem; }
              a.card span { color: #555; font-size: 0.95rem; }
              footer { margin-top: 2.5rem; color: #666; font-size: 0.9rem; }
              code { background: #f3f3f3; padding: 0.1rem 0.35rem; border-radius: 4px; }
            </style>
          </head>
          <body>
            <img src="logo.svg" alt="theoryforge hex logo" width="132" style="float: right; margin: 0 0 1rem 1.5rem;">
            <h1>theoryforge</h1>
            <p class="lead">Twin, feature-parity packages for a reproducible workflow of theory
            building, development, and testing. The R and Python implementations share one
            specification and produce identical verdicts.</p>
            <div class="cards">
              <a class="card" href="r/index.html">
                <h2>R package</h2>
                <span>Reference and guides (pkgdown). Install from CRAN with
                <code>install.packages("theoryforge")</code>.</span>
              </a>
              <a class="card" href="python/index.html">
                <h2>Python package</h2>
                <span>Reference and guides (mkdocs). Install from PyPI with
                <code>pip install theoryforge</code>.</span>
              </a>
            </div>
            <footer>Source: <a href="https://github.com/pablobernabeu/theoryforge">github.com/pablobernabeu/theoryforge</a></footer>
          </body>
          </html>
          HTML

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          force_orphan: true
