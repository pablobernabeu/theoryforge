name: docs

on:
  push:
    branches: [main]
    paths:
      - 'r/theoryforge/**'
      - 'python/**'
      - 'apps/**'
      - '.github/workflows/docs.yml'
      - '.github/landing.html'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: r-lib/actions/setup-pandoc@v2
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: r/theoryforge
          extra-packages: any::pkgdown, local::.

      - name: Build pkgdown site
        run: Rscript -e 'pkgdown::build_site("r/theoryforge", new_process = FALSE, install = FALSE)'

      - name: Stage pkgdown under site/r
        run: |
          mkdir -p site
          cp -r r/theoryforge/docs site/r

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build mkdocs site
        run: |
          python -m pip install --quiet -e ./python "mkdocs-material" "mkdocstrings[python]"
          cd python && mkdocs build --strict -d ../site/python

      - name: Write landing page
        run: |
          cp r/theoryforge/man/figures/logo.svg site/logo.svg
          cp .github/landing.html site/index.html

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build and stage the interactive apps under site/apps
        run: |
          node apps/build.mjs
          mkdir -p site/apps
          cp -r apps/r apps/py apps/shared site/apps/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          force_orphan: true
