# Build and publish the Python package to PyPI through trusted publishing
# (OIDC), so no API token is ever stored in the repository.
#
# One-time setup on PyPI: add this repository as a pending publisher for the
# theoryforge project (workflow file "publish.yml", environment "pypi"; PyPI
# creates the project on the first upload). The workflow runs when a GitHub
# release is published; the manual trigger exists so a release cut before this
# workflow was added can still be shipped from the same commit.
name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Build the sdist and wheel
        working-directory: python
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check the distribution
        working-directory: python
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: python/dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/theoryforge/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
