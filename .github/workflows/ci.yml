name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e "python[dev,full]" build twine
      - name: Lint (ruff)
        run: ruff check python/src
      - name: Types (mypy)
        run: mypy python/src/theoryforge --ignore-missing-imports
      - name: Tests
        run: pytest python -q
      - name: Golden files are up to date
        run: |
          python scripts/gen_golden.py
          git diff --exit-code -- fixtures/expected || (echo "::error::golden files are stale; run scripts/gen_golden.py" && exit 1)
      - name: Build + twine check
        run: |
          python -m build python
          twine check python/dist/*

  r:
    name: R (CMD check --as-cran)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          working-directory: r/theoryforge
      - uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: r/theoryforge
          args: 'c("--no-manual", "--as-cran")'
          error-on: '"warning"'

  parity:
    name: Cross-language parity
    runs-on: ubuntu-latest
    needs: [python, r]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::yaml
            any::jsonlite
          working-directory: r/theoryforge
      - name: Install both packages
        run: |
          pip install -e python
          R CMD INSTALL r/theoryforge
      - name: Check R == Python on every fixture
        run: python scripts/parity_check.py
