name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e "python[dev]" build twine
      - name: Lint (ruff)
        run: ruff check python/src
      - name: Types (mypy)
        run: mypy python/src/theoryforge --ignore-missing-imports
      - name: Tests
        run: pytest python -q
      - name: Golden files are up to date
        run: |
          python scripts/gen_golden.py
          git diff --exit-code -- fixtures/expected || (echo "::error::golden files are stale; run scripts/gen_golden.py" && exit 1)
      - name: Build + twine check
        run: |
          python -m build python
          twine check python/dist/*

  r:
    name: R (CMD check --as-cran, ${{ matrix.config.os }} ${{ matrix.config.r }})
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        # This job was Linux-only, so nothing caught a Windows-specific problem
        # before a CRAN submission. Windows on R-devel is the combination
        # win-builder checks, so running it here gives that signal on every push
        # rather than by email after an upload.
        config:
          - {os: ubuntu-latest,  r: 'release'}
          - {os: ubuntu-latest,  r: 'devel'}
          - {os: windows-latest, r: 'release'}
          - {os: windows-latest, r: 'devel'}
    steps:
      - uses: actions/checkout@v7
      # The vignettes are built during the check, so pandoc must be present on
      # every runner rather than assumed from the image.
      - uses: r-lib/actions/setup-pandoc@v2
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          working-directory: r/theoryforge
      - uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: r/theoryforge
          args: 'c("--no-manual", "--as-cran")'
          error-on: '"warning"'

  apps:
    name: Apps (syntax + vendor build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
      - name: Syntax-check the app sources
        run: |
          node --check apps/shared/app-core.js
          node --check apps/r/r-runtime.js
          node --check apps/py/py-runtime.js
          node --check apps/build.mjs
      - name: The vendor build assembles cleanly
        run: |
          node apps/build.mjs
          node -e "const m=require('./apps/r/vendor/manifest.json'); if(!m.rFiles.length||!m.examples.length) throw new Error('empty R manifest')"
          node -e "const m=require('./apps/py/vendor/manifest.json'); if(!m.pyFiles.length||!m.examples.length) throw new Error('empty Python manifest')"

  parity:
    name: Cross-language parity
    runs-on: ubuntu-latest
    needs: [python, r]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::yaml
            any::jsonlite
          working-directory: r/theoryforge
      - name: Install both packages
        run: |
          pip install -e python
          R CMD INSTALL r/theoryforge
      - name: Check R == Python on every fixture
        run: python scripts/parity_check.py
