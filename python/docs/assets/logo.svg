<svg viewBox="0 0 174 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#21354a"/>
      <stop offset="1" stop-color="#132130"/>
    </linearGradient>
    <radialGradient id="ember" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#ffc863"/>
      <stop offset="1" stop-color="#ef9d2c"/>
    </radialGradient>
    <marker id="ah" markerWidth="5.5" markerHeight="5.5" refX="4.6" refY="2.5" orient="auto">
      <path d="M0,0 L5,2.5 L0,5 Z" fill="#74cabb"/>
    </marker>
  </defs>

  <!-- hexagon body + border -->
  <path d="M87,7 L167,53.5 L167,146.5 L87,193 L7,146.5 L7,53.5 Z"
        fill="url(#bg)" stroke="#4cc2b0" stroke-width="7" stroke-linejoin="round"/>

  <!-- construct network (directed edges, then nodes on top) -->
  <g stroke="#74cabb" stroke-width="2.6" fill="none">
    <line x1="67" y1="74" x2="105" y2="74" marker-end="url(#ah)"/>
    <line x1="63" y1="86" x2="78"  y2="109" marker-end="url(#ah)"/>
    <line x1="112" y1="86" x2="96" y2="109" marker-end="url(#ah)"/>
  </g>
  <circle cx="54"  cy="74"  r="12" fill="#4cc2b0" stroke="#132130" stroke-width="2.5"/>
  <circle cx="120" cy="74"  r="12" fill="#4cc2b0" stroke="#132130" stroke-width="2.5"/>
  <circle cx="87"  cy="122" r="13.5" fill="url(#ember)" stroke="#132130" stroke-width="2.5"/>

  <!-- wordmark -->
  <text x="87" y="166" text-anchor="middle"
        font-family="Segoe UI, Helvetica, Arial, sans-serif"
        font-size="19" font-weight="600" letter-spacing="-0.2" fill="#f3f6f7">theoryforge</text>
</svg>
