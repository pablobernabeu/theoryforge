site_name: theoryforge (Python)
site_description: A rigorous, reproducible workflow for theory building, development, and testing.
site_author: Pablo Bernabeu
site_url: https://pablobernabeu.github.io/theoryforge/python/
repo_url: https://github.com/pablobernabeu/theoryforge
copyright: Author and maintainer, Pablo Bernabeu (ORCID 0000-0003-1083-2460)

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/logo.png
  features:
    - navigation.sections
    - content.code.copy

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Workflow modes: workflow-modes.md
  - Literature layer: literature.md
  - Methodological foundations: methodology.md
  - API reference: api.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_root_heading: true
            docstring_style: google

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences

# Build with:  pip install mkdocs-material "mkdocstrings[python]" && mkdocs build
