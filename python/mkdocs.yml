site_name: theoryforge (Python)
site_description: Systematic theory development. A reproducible workflow for building, developing and testing scientific theories.
site_author: Pablo Bernabeu
site_url: https://pablobernabeu.github.io/theoryforge/python/
repo_url: https://github.com/pablobernabeu/theoryforge
copyright: >-
  Developed by <a href="https://pablobernabeu.github.io">Pablo Bernabeu</a>.
  Open, reproducible research software in R and Python.

theme:
  name: material
  custom_dir: overrides
  logo: assets/logo.svg
  favicon: assets/logo.png
  font:
    text: Inter
    code: JetBrains Mono
  # The header and footer are held at the deep-navy brand ink in both schemes
  # (primary: black is the closest preset, retuned to the exact navy in
  # stylesheets/brand.css); accent carries the warm amber.
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight

extra_css:
  - stylesheets/brand.css
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Workflow modes: workflow-modes.md
  - Methodological foundations: methodology.md
  - Literature layer: literature.md
  - Changelog: changelog.md
  - API reference: api.md
  - About: about.md
  - Interactive app ↗: https://pablobernabeu.github.io/theoryforge/apps/py/

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_root_heading: true
            docstring_style: google

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences

# Build with:  pip install mkdocs-material "mkdocstrings[python]" && mkdocs build
