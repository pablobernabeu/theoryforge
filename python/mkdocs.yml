site_name: theoryforge (Python)
site_description: Systematic theory development. A reproducible workflow for building, developing and testing scientific theories.
site_author: Pablo Bernabeu
site_url: https://pablobernabeu.github.io/theoryforge/python/
repo_url: https://github.com/pablobernabeu/theoryforge
# The licence link is absolute: the copyright line renders on every page, and a
# relative link would resolve against nested pages and break.
copyright: >-
  <span class="mrd-footer-badges">
  <a href="https://github.com/pablobernabeu/theoryforge/actions/workflows/ci.yml"><img src="https://github.com/pablobernabeu/theoryforge/actions/workflows/ci.yml/badge.svg" alt="CI"></a>
  <a href="https://lifecycle.r-lib.org/articles/stages.html#experimental"><img src="https://img.shields.io/badge/lifecycle-experimental-orange.svg" alt="Lifecycle: experimental"></a>
  <a href="https://opensource.org/license/MIT"><img src="https://img.shields.io/badge/license-MIT-blue.svg" alt="License: MIT"></a>
  </span>
  Developed by <a href="https://pablobernabeu.github.io">Pablo Bernabeu</a>.
  Open, reproducible research software in R and Python. Released under the
  <a href="https://pablobernabeu.github.io/theoryforge/python/licence/">MIT licence</a>.

theme:
  name: material
  custom_dir: overrides
  logo: assets/logo.svg
  favicon: assets/logo.png
  font:
    text: Inter
    code: JetBrains Mono
  # The header and footer are held at the deep-navy brand ink in both schemes
  # (primary: black is the closest preset, retuned to the exact navy in
  # stylesheets/brand.css); accent carries the warm amber.
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight

extra_css:
  - stylesheets/brand.css
  - stylesheets/extra.css

# The app is reached through the header App pill (overrides/partials/header.html),
# matching the family convention, so it does not repeat in the nav.
nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Guides:
      - Workflow modes: workflow-modes.md
      - Literature layer: literature.md
      - Methodological foundations: methodology.md
  - API reference: api.md
  - Changelog: changelog.md
  - About: about.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_root_heading: true
            docstring_style: google

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  # Snippets embeds the repository LICENSE into the licence page, so the page
  # can never drift from the file. pymdown-extensions ships with mkdocs-material.
  - pymdownx.snippets:
      check_paths: true

# Build with:  pip install mkdocs-material "mkdocstrings[python]" && mkdocs build

# The released version shown beside the title in the header (updated on release).
extra:
  version: "0.1.0"
