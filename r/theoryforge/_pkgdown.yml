url: https://pablobernabeu.github.io/theoryforge/r

# The R package lives in a subdirectory of the monorepo (r/theoryforge/), not
# at the repository root. Left to auto-detect from DESCRIPTION's URL field,
# pkgdown's per-file "Source: <path>" links (function reference pages,
# NEWS.md) resolve one level too high and 404. Point the source template at
# the package's actual subdirectory; the repo/issue links stay at the root,
# which is correct for those.
repo:
  url:
    home: https://github.com/pablobernabeu/theoryforge/
    source: https://github.com/pablobernabeu/theoryforge/blob/main/r/theoryforge/
    issue: https://github.com/pablobernabeu/theoryforge/issues/
    user: https://github.com/

template:
  bootstrap: 5
  light-switch: true
  bslib:
    primary: "#0F6E6E"
  # Fonts are loaded as a plain stylesheet link (Spectral for headings, Inter
  # for body, JetBrains Mono for code) and applied in pkgdown/extra.scss. This
  # avoids bslib's build-time font download and keeps the brand identical to the
  # mkdocs twin and the rest of the package family.
  includes:
    in_header: |
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Spectral:ital,wght@0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

authors:
  Pablo Bernabeu:
    href: https://pablobernabeu.github.io/

# Replace the auto-generated "Citation" sidebar section (which links to
# authors.html) with one that points at the About page, where the tailored
# citation lives, plus a direct BibTeX download. pkgdown copies
# pkgdown/assets/theoryforge.bib to the site root. Dropping the built-in
# "citation" from the structure and supplying a custom "cite" component is more
# reliable than trying to override the built-in in place.
footer:
  structure:
    left: [developed_by]
    right: [legal, built_with]
  components:
    developed_by: >
      Developed by [Pablo Bernabeu](https://pablobernabeu.github.io). Open,
      reproducible research software in R and Python.
    legal: >
      Released under the [MIT licence](LICENSE.html).

home:
  sidebar:
    structure: [links, license, community, cite, authors, dev]
    components:
      # One British-spelled licence link. pkgdown's default licence section
      # renders the raw "MIT + file LICENSE" field and links a stub page, which
      # reads as more than one licence; this collapses it to a single link.
      license:
        title: Licence
        text: >
          [MIT licence](LICENSE.html)
      # Contributing only (no Code of Conduct row); pkgdown builds
      # CONTRIBUTING.html from .github/CONTRIBUTING.md.
      community:
        title: Community
        text: >
          [Contributing guide](CONTRIBUTING.html)
      cite:
        title: Citation
        text: |
          [How to cite theoryforge](articles/about.html) ·
          [Download BibTeX](theoryforge.bib)

          [![DOI](https://zenodo.org/badge/DOI/10.5281/zenodo.21229964.svg)](https://doi.org/10.5281/zenodo.21229964)

navbar:
  structure:
    left:  [intro, reference, articles, news, about]
    right: [app, search, github, lightswitch]
  components:
    app:
      text: App
      href: https://pablobernabeu.github.io/theoryforge/apps/r/
      icon: fa-play
      aria-label: The interactive app
    # Curate the Articles dropdown with explicit links (href strings, so no
    # tidyselect evaluation of hyphenated slugs) and keep About out of it; About
    # is still built and reached via its own top-level navbar item. Ordered to
    # follow the workflow arc: continue the Get Started (BUILD) walkthrough
    # into development and testing, then the additive literature layer, then
    # the methodological rationale behind all the checks.
    articles:
      text: Articles
      menu:
      - text: Developing and testing
        href: https://pablobernabeu.github.io/theoryforge/r/articles/developing-and-testing.html
      - text: Literature layer
        href: https://pablobernabeu.github.io/theoryforge/r/articles/literature.html
      - text: Methodological foundations
        href: https://pablobernabeu.github.io/theoryforge/r/articles/methodology.html
    about:
      text: About
      href: https://pablobernabeu.github.io/theoryforge/r/articles/about.html

reference:
- title: Core IO
  desc: Read, validate and write theory objects.
  contents:
  - tf_read
  - tf_validate
  - tf_write
- title: Builder (BUILDING mode)
  desc: Construct a theory incrementally with provenance tracking.
  contents:
  - tf_theory
  - tf_add_construct
  - tf_add_proposition
  - tf_add_prediction
  - tf_add_alternative
  - tf_add_assumption
  - tf_set_formal_model
- title: Rigour
  desc: Score a theory against the versioned rigour checklist.
  contents:
  - tf_check
  - tf_report
  - tf_severity
- title: Redundancy
  desc: Deterministic lexical redundancy screen.
  contents:
  - tf_tokens
  - tf_jaccard
  - tf_redundancy_check
  - tf_embedding_redundancy
- title: Diagram
  desc: Byte-identical diagram intermediate representations, and native rendering.
  contents:
  - tf_diagram
  - tf_lit_diagram
  - tf_render_diagram
- title: Develop
  desc: Lakatosian amendment appraisal.
  contents:
  - tf_appraise_amendment
- title: Testing and review
  desc: Preregistration, SEM compilation and the audit dossier.
  contents:
  - tf_preregister
  - tf_compile_sem
  - tf_dossier
- title: Simulation
  desc: Integrate the construct network as a dynamical system.
  contents:
  - tf_simulate
- title: Reporting and deposit
  desc: Render a report and deposit it.
  contents:
  - tf_render_report
  - tf_osf_push
- title: Literature layer
  desc: Bibliometric mapping of a literature corpus.
  contents:
  - tf_read_corpus
  - tf_litmap
  - tf_landscape
  - tf_fetch_corpus
  - tf_new_evidence_dois
